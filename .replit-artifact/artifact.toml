kind = "web"
previewPath = "/"
title = "SMTP Sales Manager Pro"
version = "1.0.0"
id = "artifacts/smtp-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25880

[services.development]
run = "pnpm --filter @workspace/smtp-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smtp-manager", "run", "build" ]
publicDir = "artifacts/smtp-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25880"
BASE_PATH = "/"
